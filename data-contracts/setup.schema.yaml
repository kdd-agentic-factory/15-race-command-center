id: setup.schema
version: 0.1.0
type: object
required: [setup_id, circuit_id, chassis, suspension, braking, electronics, tires]
properties:
  setup_id:
    type: string
  circuit_id:
    type: string
  chassis:
    type: object
  suspension:
    type: object
  braking:
    type: object
  electronics:
    type: object
  tires:
    type: object
  aero_parts:
    type: array
    items:
      type: string

