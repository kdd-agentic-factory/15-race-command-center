apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: race-command-center
  namespace: race-command-center
spec:
  rules:
    - host: race-command-center.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: race-command-center-dashboard
                port:
                  number: 80

