apiVersion: apps/v1
kind: Deployment
metadata:
  name: race-command-center-dashboard
  namespace: race-command-center
spec:
  replicas: 1
  selector:
    matchLabels:
      app: race-command-center-dashboard
  template:
    metadata:
      labels:
        app: race-command-center-dashboard
    spec:
      containers:
        - name: dashboard
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: race-command-center-config

